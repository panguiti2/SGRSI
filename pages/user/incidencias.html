<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidencia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/formularios.css">

</head>

<body class="d-flex flex-column min-vh-100 sgrsi-app" id="inicio">

    <header class="navbar navbar-expand-md navbar-dark sgrsi-navbar sticky-top">
        <section class="container-fluid">
            <a class="navbar-brand fw-bold" href="user.html"><img src="../../assets/img/logoITI.png" alt="Logo ITI" class="sgrsi-navbar-logo">SGRSI</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal"
                aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menú">
                <span class="navbar-toggler-icon"></span>
            </button>

            <nav class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="user.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="solicitudes.html">Solicitudes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="incidencias.html">Incidencias</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="registroUso.html">Registro de Uso</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../../index.html">Cerrar Sesión</a>
                    </li>
                </ul>
            </nav>
        </section>
    </header>

    <main class="flex-grow-1 p-2 p-md-3 p-lg-4">
        <section class="seccionFormulario bg-white rounded p-3 p-md-4">
            <form>
                <fieldset>
                    <legend class="h4 mb-4">Reportar incidencia</legend>

                    <section class="row g-3 mb-4">
                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="laboratorio" class="form-label">Laboratorio</label>
                            <select id="laboratorio" class="form-select" required>
                                <option value="" disabled selected>Seleccione laboratorio</option>
                                <option value="n/a">N/A</option>
                                <option value="lab1">Laboratorio 1</option>
                                <option value="lab2">Laboratorio 2</option>
                                <option value="lab3">Laboratorio 3</option>
                                <option value="lab4">Laboratorio 4</option>
                                <option value="lab5">Laboratorio 5</option>
                                <option value="lab6">Laboratorio 6</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="taller" class="form-label">Taller</label>
                            <select id="taller" class="form-select" required>
                                <option value="" disabled selected>Seleccione taller</option>
                                <option value="n/a">N/A</option>
                                <option value="taller1">Taller 1</option>
                                <option value="taller2">Taller 2</option>
                                <option value="taller3">Taller 3</option>
                            </select>
                        </div>


                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="turno" class="form-label">Turno</label>
                            <select id="turno" name="turno" class="form-select" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="turno1">Matutino</option>
                                <option value="turno2">Vespertino</option>
                                <option value="turno3">Nocturno</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="fechaHora" class="form-label">Fecha y hora</label>
                            <input type="datetime-local" id="fechaHora" name="fechaHora" class="form-control" required>
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="docente" class="form-label">Docente</label>
                            <input type="text" id="docente" name="docente" class="form-control"
                                placeholder="Nombre del docente" required>
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="grupo" class="form-label">Grupo</label>
                            <input type="text" id="grupo" name="grupo" class="form-control"
                                placeholder="Nombre del grupo" required>
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="asignatura" class="form-label">Asignatura</label>
                            <input type="text" id="asignatura" name="asignatura" class="form-control"
                                placeholder="Nombre de la asignatura" required>
                        </div>


                        <div class="col-12 col-md-6 cajaRadio">
                            <label class="form-label d-block">¿Reportó alumno?</label>
                            <section class="d-flex gap-3">
                                <div class="form-check">
                                    <input type="radio" name="incidencias" value="si" class="form-check-input"
                                        id="alumSi" required>
                                    <label class="form-check-label" for="alumSi">Sí</label>
                                </div>
                                <div class="form-check">
                                    <input type="radio" name="incidencias" value="no" class="form-check-input"
                                        id="alumNo">
                                    <label class="form-check-label" for="alumNo">No</label>
                                </div>
                            </section>
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="nombreAlumno" class="form-label">Nombre del alumno</label>
                            <input type="text" id="nombreAlumno" name="nombreAlumno" class="form-control"
                                placeholder="Si aplica">
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="maquina" class="form-label">N° máquina</label>
                            <input type="number" id="maquina" name="maquina" class="form-control" min="1"
                                placeholder="Ej: 12">
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="recurso" class="form-label">Recurso afectado</label>
                            <select id="recurso" name="recurso" class="form-select" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="mouse">Mouse</option>
                                <option value="teclado">Teclado</option>
                                <option value="monitor">Monitor</option>
                                <option value="torre">Torre</option>
                                <option value="red">Red/Internet</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6 cajaEntradaDeDatos">
                            <label for="tipoIncidencia" class="form-label">Tipo de incidencia</label>
                            <select id="tipoIncidencia" name="tipoIncidencia" class="form-select" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="no_funciona">No funciona</option>
                                <option value="lento">Funcionamiento lento</option>
                                <option value="sin_conexion">Sin conexión</option>
                                <option value="daño_fisico">Daño físico</option>
                                <option value="software">Problema de software</option>
                                <option value="periferico">Falla de periférico</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>

                        <div class="col-12 cajaTextarea">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <textarea id="descripcion" name="descripcion" class="form-control"
                                placeholder="Describa la incidencia..." rows="4" required></textarea>
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100">Registrar incidencia</button>
                        </div>
                    </section>
                </fieldset>
            </form>
        </section>
    </main>

    <footer class="sgrsi-footer text-light mt-auto py-3 py-md-4">
        <address class="d-flex flex-column flex-md-row justify-content-center gap-2 gap-md-3 text-center mb-2">
            <a href="http://instagram.com" class="text-light text-decoration-none">@SGRSI</a>
            <a href="tel:+29043586" class="text-light text-decoration-none">+29043586</a>
            <a href="mailto:asistentesiti@gmail.com" class="text-light text-decoration-none">asistentesiti@gmail.com</a>
        </address>
        <p class="text-center mb-0">© 2026 SGRSI</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
