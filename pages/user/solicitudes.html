<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes</title>

</head>

<body id="inicio">

    <header>
        <section>
            <a href="user.html">SGRSI</a>

            <nav id="menuPrincipal">
                <ul>
                    <li>
                        <a href="user.html">Inicio</a>
                    </li>
                    <li>
                        <a href="solicitudes.html">Solicitudes</a>
                    </li>
                    <li>
                        <a href="incidencias.html">Incidencias</a>
                    </li>
                    <li>
                        <a href="registroUso.html">Registro de Uso</a>
                    </li>
                    <li>
                        <a href="../../index.html">Cerrar Sesión</a>
                    </li>
                </ul>
            </nav>
        </section>
    </header>

    <main>

        <section>
            <button>Mis solicitudes</button>

            <form>
                <fieldset>
                    <legend>Solicitar servicio</legend>

                    <section>
                        <div>
                            <label for="laboratorio">Laboratorio</label>
                            <select id="laboratorio" required>
                                <option value="" disabled selected>Seleccione laboratorio</option>
                                <option value="n/a">N/A</option>
                                <option value="lab1">Laboratorio 1</option>
                                <option value="lab2">Laboratorio 2</option>
                                <option value="lab3">Laboratorio 3</option>
                                <option value="lab4">Laboratorio 4</option>
                                <option value="lab5">Laboratorio 5</option>
                                <option value="lab6">Laboratorio 6</option>
                            </select>
                        </div>

                         <div>
                            <label for="taller">Taller</label>
                            <select id="taller" required>
                                <option value="" disabled selected>Seleccione taller</option>
                                <option value="n/a">N/A</option>
                                <option value="taller1">Taller 1</option>
                                <option value="taller2">Taller 2</option>
                                <option value="taller3">Taller 3</option>
                            </select>
                        </div>

                        <div>
                            <label for="turno">Turno</label>
                            <select id="turno" name="turno" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="turno1">Matutino</option>
                                <option value="turno2">Vespertino</option>
                                <option value="turno3">Nocturno</option>
                            </select>
                        </div>

                        <div>
                            <label for="docente">Docente</label>
                            <input type="text" id="docente" name="docente" required
                                placeholder="Ingrese su nombre">
                        </div>

                        <div>
                            <label for="asignatura">Asignatura</label>
                            <input type="text" id="asignatura" name="asignatura"
                                placeholder="Nombre de la asignatura" required>
                        </div>

                        <div>
                            <label for="email">Correo electrónico</label>
                            <input type="email" id="email" name="email"
                                placeholder="ejemplo@correo.com" required>
                        </div>

                        <div>
                            <label for="fechaHora">Fecha y hora solicitada</label>
                            <input type="datetime-local" id="fechaHora" name="fechaHora" required>
                        </div>

                        <div>
                            <label for="tipoServicio">Tipo de servicio</label>
                            <select id="tipoServicio" name="tipoServicio" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="instalacion">Instalación de software</option>
                                <option value="actualizacion">Actualización</option>
                                <option value="configuracion">Configuración</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>

                        <div>
                            <label for="software">Programa/App</label>
                            <input type="text" id="software" name="software"
                                placeholder="Ej: Scratch, GeoGebra, VS Code">
                        </div>

                        <div>
                            <label>¿En todas las máquinas?</label>
                            <section>
                                <div>
                                    <input type="radio" name="todasMaquinas" value="si"
                                        id="todasSi">
                                    <label for="todasSi">Sí</label>
                                </div>
                                <div>
                                    <input type="radio" name="todasMaquinas" value="no"
                                        id="todasNo">
                                    <label for="todasNo">No</label>
                                </div>
                            </section>
                        </div>

                        <div>
                            <label for="prioridad">Prioridad</label>
                            <select id="prioridad" name="prioridad">
                                <option value="normal">Normal</option>
                                <option value="urgente">Urgente</option>
                            </select>
                        </div>

                        <div>
                            <label for="descripcion">Descripción / uso en clase</label>
                            <textarea id="descripcion" name="descripcion" rows="4"
                                placeholder="Describa su solicitud.."></textarea>
                        </div>

                        <div>
                            <button type="submit">Solicitar servicio</button>
                        </div>
                    </section>
                </fieldset>
            </form>
        </section>

    </main>

    <footer>
        <address>
            <a href="http://instagram.com">@SGRSI</a>

        </address>
        <p>© 2026 SGRSI</p>
    </footer>
</body>

</html>
