<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidencia</title>

</head>

<body id="inicio">

    <header>
        <section>
            <a href="user.html">SGRSI</a>

            <nav id="menuPrincipal">
                <ul>
                    <li>
                        <a href="user.html">Inicio</a>
                    </li>
                    <li>
                        <a href="solicitudes.html">Solicitudes</a>
                    </li>
                    <li>
                        <a href="incidencias.html">Incidencias</a>
                    </li>
                    <li>
                        <a href="registroUso.html">Registro de Uso</a>
                    </li>
                    <li>
                        <a href="../../index.html">Cerrar Sesión</a>
                    </li>
                </ul>
            </nav>
        </section>
    </header>

    <main>
        <section>
            <form>
                <fieldset>
                    <legend>Reportar incidencia</legend>

                    <section>
                        <div>
                            <label for="laboratorio">Laboratorio</label>
                            <select id="laboratorio" required>
                                <option value="" disabled selected>Seleccione laboratorio</option>
                                <option value="n/a">N/A</option>
                                <option value="lab1">Laboratorio 1</option>
                                <option value="lab2">Laboratorio 2</option>
                                <option value="lab3">Laboratorio 3</option>
                                <option value="lab4">Laboratorio 4</option>
                                <option value="lab5">Laboratorio 5</option>
                                <option value="lab6">Laboratorio 6</option>
                            </select>
                        </div>

                        <div>
                            <label for="taller">Taller</label>
                            <select id="taller" required>
                                <option value="" disabled selected>Seleccione taller</option>
                                <option value="n/a">N/A</option>
                                <option value="taller1">Taller 1</option>
                                <option value="taller2">Taller 2</option>
                                <option value="taller3">Taller 3</option>
                            </select>
                        </div>


                        <div>
                            <label for="turno">Turno</label>
                            <select id="turno" name="turno" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="turno1">Matutino</option>
                                <option value="turno2">Vespertino</option>
                                <option value="turno3">Nocturno</option>
                            </select>
                        </div>

                        <div>
                            <label for="fechaHora">Fecha y hora</label>
                            <input type="datetime-local" id="fechaHora" name="fechaHora" required>
                        </div>

                        <div>
                            <label for="docente">Docente</label>
                            <input type="text" id="docente" name="docente"
                                placeholder="Nombre del docente" required>
                        </div>

                        <div>
                            <label for="grupo">Grupo</label>
                            <input type="text" id="grupo" name="grupo"
                                placeholder="Nombre del grupo" required>
                        </div>

                        <div>
                            <label for="asignatura">Asignatura</label>
                            <input type="text" id="asignatura" name="asignatura"
                                placeholder="Nombre de la asignatura" required>
                        </div>


                        <div>
                            <label>¿Reportó alumno?</label>
                            <section>
                                <div>
                                    <input type="radio" name="incidencias" value="si"
                                        id="alumSi" required>
                                    <label for="alumSi">Sí</label>
                                </div>
                                <div>
                                    <input type="radio" name="incidencias" value="no"
                                        id="alumNo">
                                    <label for="alumNo">No</label>
                                </div>
                            </section>
                        </div>

                        <div>
                            <label for="nombreAlumno">Nombre del alumno</label>
                            <input type="text" id="nombreAlumno" name="nombreAlumno"
                                placeholder="Si aplica">
                        </div>

                        <div>
                            <label for="maquina">N° máquina</label>
                            <input type="number" id="maquina" name="maquina" min="1"
                                placeholder="Ej: 12">
                        </div>

                        <div>
                            <label for="recurso">Recurso afectado</label>
                            <select id="recurso" name="recurso" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="mouse">Mouse</option>
                                <option value="teclado">Teclado</option>
                                <option value="monitor">Monitor</option>
                                <option value="torre">Torre</option>
                                <option value="red">Red/Internet</option>
                            </select>
                        </div>

                        <div>
                            <label for="tipoIncidencia">Tipo de incidencia</label>
                            <select id="tipoIncidencia" name="tipoIncidencia" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="no_funciona">No funciona</option>
                                <option value="lento">Funcionamiento lento</option>
                                <option value="sin_conexion">Sin conexión</option>
                                <option value="daño_fisico">Daño físico</option>
                                <option value="software">Problema de software</option>
                                <option value="periferico">Falla de periférico</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>

                        <div>
                            <label for="descripcion">Descripción</label>
                            <textarea id="descripcion" name="descripcion"
                                placeholder="Describa la incidencia..." rows="4" required></textarea>
                        </div>

                        <div>
                            <button type="submit">Registrar incidencia</button>
                        </div>
                    </section>
                </fieldset>
            </form>
        </section>
    </main>

        </address>
        <p>© 2026 SGRSI</p>
    </footer>
</body>

</html>
