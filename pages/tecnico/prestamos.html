    <main>

        <section>
            <section>
                <h2>Préstamos</h2>
            </section>
            <button id="btnRegistrarPrestamo"> Registrar Préstamo</button>
       
       
            <section>
                <table>
                    <thead>
                        <tr>
                            <th >CI</th>
                            <th >Turno</th>
                            <th >Nombre</th>
                            <th >Máquina</th>
                            <th >Retiro</th>
                            <th >Devolución</th>
                            <th >Operaciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaPrestamos"></tbody>
                </table>
            </section>
        </section>

        <dialog>
            <button id="btnCerrarRegistarPrestamo" type="button"
                aria-label="Cerrar"></button>

            <form id="formularioPrestamos">
                <fieldset>
                    <legend>Solicitud de Préstamo de Equipo</legend>

                    <section>
                        <div>
                            <label for="cedulaSolicitante">Cédula</label>
                            <input type="text" id="cedulaSolicitante" name="cedulaSolicitante"
                                pattern="[1-9][0-9]{7}" maxlength="8" required placeholder="Ingrese CI">
                        </div>

                        <div>
                            <label for="turno">Turno</label>
                            <select id="turno" name="turno" required>
                                <option value="" disabled selected>Seleccione</option>
                                <option value="Matutino">Matutino</option>
                                <option value="Vespertino">Vespertino</option>
                                <option value="Nocturno">Nocturno</option>
                            </select>
                        </div>

                        <div>
                            <label for="nombreSolicitante">Nombre</label>
                            <input type="text" id="nombreSolicitante" name="nombreSolicitante"
                                required placeholder="Ingrese Nombre">
                        </div>

                        <div>
                            <label for="maquina">N° de máquina</label>
                            <input type="number" id="maquina" name="maquina" required>
                        </div>

                        <div>
                            <label for="retiro">Fecha y hora de retiro</label>
                            <input type="datetime-local" id="retiro" name="retiro" required>
                        </div>

                        <div>
                            <label for="devolucion">Fecha y hora de devolución</label>
                            <input type="datetime-local" id="devolucion" name="devolucion"
                                required>
                        </div>
                    </section>

                    <button type="submit">Guardar</button>
                </fieldset>
            </form>
        </dialog>

    </main>
